<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalinka PUBG - Linktree</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;900&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --card-width: 319px;
            --card-height: 580px; 
            --btn-width: 272px;
            --btn-height: 55px;
            --main-color: #7B61FF; 
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.1) 0%, rgba(0, 0, 0, 0) 50%, rgba(123, 97, 255, 0.05) 100%);
            z-index: -1;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-top: 60px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            /* Отступ сверху уменьшили, чтобы поднять контент */
            padding-top: 100px; 
            box-sizing: border-box;
        }

        /* 3D Шлем — Сделали аккуратнее */
        model-viewer {
            width: 200px; 
            height: 200px; 
            position: absolute;
            top: -140px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            --poster-color: transparent;
        }

        /* Аватарка — Без лишних кругов, плотная окантовка */
        .avatar-container {
            width: 100px; /* Увеличили размер */
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--main-color); /* Окантовка прямо по краю */
            box-shadow: 0 0 20px rgba(123, 97, 255, 0.5);
            overflow: hidden;
            z-index: 2;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-container img {
            width: 160%;
            height: 160%;
            object-fit: cover;
        }

        .info {
            text-align: center;
            margin-top: 15px; /* Чуть ближе к аватару */
            color: white;
            margin-bottom: 25px;
        }

        .nickname {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1.5px;
        }

        .description {
            font-weight: 500;
            font-size: 13px;
            opacity: 0.8;
            margin: 5px 0 0 0;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Плотный шаг кнопок */
        }

        .btn {
            width: var(--btn-width);
            height: var(--btn-height);
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

       /* Общий эффект прыжка для всех кнопок */
        .btn:hover {
            transform: translateY(-3px);
            transition: all 0.3s ease;
        }

        /* Индивидуальная светлая подсветка для Telegram (Голубой) */
        .btn-tg:hover {
            box-shadow: 0 8px 20px rgba(58, 138, 203, 0.5);
            background: linear-gradient(90deg, #4a80b5 0%, #5cb3f0 100%);
        }

        /* Индивидуальная светлая подсветка для YouTube (Красный) */
        .btn-yt:hover {
            box-shadow: 0 8px 20px rgba(203, 42, 42, 0.5);
            background: linear-gradient(90deg, #a63232 0%, #e64545 100%);
        }

        /* Индивидуальная светлая подсветка для Twitch (Фиолетовый) */
        .btn-tw:hover {
            box-shadow: 0 8px 20px rgba(122, 42, 203, 0.5);
            background: linear-gradient(90deg, #6633b3 0%, #9947ff 100%);
        }

        .btn img {
            width: 36px;
            height: 36px;
            margin-left: 15px;
            margin-right: 15px;
        }

        /* Цвета кнопок */
        .tg { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); }
        .yt { background: linear-gradient(90deg, #8b1e1e 0%, #b22222 100%); }
        .tw { background: linear-gradient(90deg, #4b1e8b 0%, #6a2cc9 100%); }
        
        
      
        /* Точки внизу */
        .dots {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 25px; /* Увеличили отступ от кнопок */
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .dot.active {
            background-color: var(--main-color);
            box-shadow: 0 0 8px var(--main-color);
        }
    </style>
</head>
<body>

    <div class="card">
        
        <model-viewer 
            src="helmet.glb" 
            ar 
            camera-controls 
            auto-rotate 
            shadow-intensity="1" 
            camera-orbit="0deg 75deg 105%"
            exposure="1.1"
            disable-zoom>
        </model-viewer>

        <div class="avatar-container">
            <img src="ava.png" alt="Profile Avatar">
        </div>

        <div class="info">
            <h1 class="nickname">KALINKA PUBG</h1>
            <p class="description">PUBG MOBILE STREAMER<br>AND DESIGNER</p>
        </div>

        <div class="buttons">
            <a href="https://t.me/kalinka_pubg_mobile" target="_blank" class="btn tg">
                <img src="logotg.svg" alt="TG"> Telegram
            </a>
            <a href="https://www.youtube.com/@KALINKA_PUBG" target="_blank" class="btn yt">
                <img src="logoyt.svg" alt="YT"> YouTube
            </a>
            <a href="https://www.twitch.tv/kalinka_pubg" target="_blank" class="btn tw">
                <img src="logotw.svg" alt="TW"> Twitch
            </a>
        </div>

        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
