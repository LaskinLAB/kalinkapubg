<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalinka PUBG - AR Card</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;900&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --card-width: 319px;
            --card-height: 529px; 
            --main-glow: #7B61FF; 
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('capli.png'), url('lico.png'), url('fonosnova.png');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: -1;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 45px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            padding-top: 85px; 
            box-sizing: border-box;
        }

        model-viewer {
            width: 280px;
            height: 280px;
            position: absolute;
            top: -145px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            --poster-color: transparent;
        }

        /* АВАТАРКА: Размер подогнан под окантовку без пустоты */
        .avatar-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--main-glow); /* Окантовка плотно к фото */
            box-shadow: 0 0 30px rgba(123, 97, 255, 0.6);
            overflow: hidden;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 25px;
        }

        .nickname {
            font-weight: 900;
            font-size: 26px;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        .description {
            font-weight: 500;
            font-size: 14px;
            opacity: 0.7;
            margin: 6px 0 0 0;
            line-height: 1.3;
        }

        .buttons-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* КНОПКИ: Текст отцентрован */
        .btn {
            width: 272px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center; /* Центровка контента */
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        /* ИКОНКИ: Сделаны крупнее */
        .btn img {
            width: 36px; /* Крупнее */
            height: 36px;
            position: absolute; /* Позволяет тексту быть строго по центру */
            left: 15px;
        }

        /* ЦВЕТА КНОПОК И ИНДИВИДУАЛЬНАЯ ПОДСВЕТКА */
        .btn-tg { background: linear-gradient(90deg, #2a5a8a 0%, #3a8acb 100%); }
        .btn-tg:hover { box-shadow: 0 0 20px rgba(58, 138, 203, 0.4); transform: scale(1.02); }

        .btn-yt { background: linear-gradient(90deg, #8a1a1a 0%, #cb2a2a 100%); }
        .btn-yt:hover { box-shadow: 0 0 20px rgba(203, 42, 42, 0.4); transform: scale(1.02); }

        .btn-tw { background: linear-gradient(90deg, #4a1a8a 0%, #7a2acb 100%); }
        .btn-tw:hover { box-shadow: 0 0 20px rgba(122, 42, 203, 0.4); transform: scale(1.02); }

        .footer-dots {
            display: flex;
            gap: 12px;
            margin-top: auto;
            margin-bottom: 30px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .dot.active {
            background-color: var(--main-glow);
            border-color: var(--main-glow);
            box-shadow: 0 0 10px var(--main-glow);
        }
    </style>
</head>
<body>

    <div class="card">
        <model-viewer 
            src="helmet.glb" 
            ar 
            camera-controls 
            auto-rotate 
            shadow-intensity="1" 
            camera-orbit="0deg 75deg 105%"
            exposure="1.2"
            disable-zoom>
        </model-viewer>

        <div class="avatar-wrapper">
            <img src="ava.png" alt="Avatar">
        </div>

        <div class="info">
            <div class="nickname">KALINKA PUBG</div>
            <div class="description">PUBG MOBILE STREAMER<br>AND DESIGNER</div>
        </div>

        <div class="buttons-list">
            <a href="https://t.me/kalinka_pubg_mobile" target="_blank" class="btn btn-tg">
                <img src="logotg.svg" alt=""> Telegram
            </a>
            <a href="https://www.youtube.com/@KALINKA_PUBG" target="_blank" class="btn btn-yt">
                <img src="logoyt.svg" alt=""> YouTube
            </a>
            <a href="https://www.twitch.tv/kalinka_pubg" target="_blank" class="btn btn-tw">
                <img src="logotw.svg" alt=""> Twitch
            </a>
        </div>

        <div class="footer-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
