<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalinka PUBG - Linktree</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;900&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --card-width: 319px;
            --card-height: 529px;
            --btn-width: 272px;
            --btn-height: 55px;
            --main-color: #7B61FF; 
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Стильный темный фон */
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Эффект свечения на фоне */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.1) 0%, rgba(0, 0, 0, 0) 50%, rgba(123, 97, 255, 0.05) 100%);
            z-index: -1;
        }

        /* Основная карточка */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-top: 100px; /* Увеличили отступ, чтобы шлем не давил сверху */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* 3D Шлем — ИЗМЕНЕННЫЙ РАЗМЕР И ПОЗИЦИЯ */
        model-viewer {
            width: 260px; /* Сделали компактнее */
            height: 260px; 
            position: absolute;
            top: -180px; /* Подняли выше над аватаркой */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            --poster-color: transparent;
        }

        /* Аватарка */
        .avatar-container {
            width: 115px;
            height: 115px;
            margin-top: -57px;
            border-radius: 50%;
            border: 3px solid var(--main-color);
            box-shadow: 0 0 25px rgba(123, 97, 255, 0.6);
            overflow: hidden;
            z-index: 2;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Текстовый блок */
        .info {
            text-align: center;
            margin-top: 25px;
            color: white;
            margin-bottom: 30px;
        }

        .nickname {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .description {
            font-weight: 500;
            font-size: 14px;
            opacity: 0.8;
            margin: 8px 0 0 0;
            line-height: 1.4;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            width: var(--btn-width);
            height: var(--btn-height);
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(123, 97, 255, 0.3);
        }

        .btn img {
            width: 28px;
            height: 28px;
            margin-left: 18px;
            margin-right: 18px;
        }

        .tg { background: linear-gradient(135deg, #1e3c72 0%, #1a1a2e 100%); }
        .yt { background: linear-gradient(135deg, #8b1e1e 0%, #1a1a2e 100%); }
        .tw { background: linear-gradient(135deg, #4b1e8b 0%, #1a1a2e 100%); }

        /* Точки внизу */
        .dots {
            display: flex;
            gap: 12px;
            margin-top: auto;
            margin-bottom: 25px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        .dot.active {
            background-color: var(--main-color);
            box-shadow: 0 0 10px rgba(123, 97, 255, 0.8);
        }
    </style>
</head>
<body>

    <div class="card">
        
        <model-viewer 
            src="helmet.glb" 
            ar 
            camera-controls 
            auto-rotate 
            shadow-intensity="1.5" 
            camera-orbit="0deg 75deg 105%"
            exposure="1"
            disable-zoom>
        </model-viewer>

        <div class="avatar-container">
            <img src="ava.png" alt="Profile Avatar">
        </div>

        <div class="info">
            <h1 class="nickname">KALINKA PUBG</h1>
            <p class="description">PUBG MOBILE STREAMER<br>AND DESIGNER</p>
        </div>

        <div class="buttons">
            <a href="https://t.me/kalinka_pubg_mobile" target="_blank" class="btn tg">
                <img src="logotg.svg" alt="TG"> Telegram
            </a>
            <a href="https://www.youtube.com/@KALINKA_PUBG" target="_blank" class="btn yt">
                <img src="logoyt.svg" alt="YT"> YouTube
            </a>
            <a href="https://twitch.tv/kalinka_pubg" target="_blank" class="btn tw">
                <img src="logotw.svg" alt="TW"> Twitch
            </a>
        </div>

        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
